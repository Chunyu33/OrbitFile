name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # - name: Rust cache
      #   uses: swatinem/rust-cache@v2
      #   with:
      #     workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__'
          releaseBody: |
            ## 更新内容
            ### 迁移流程优化
            - 取消迁移现在即时响应，不再需要等待当前步骤完成
            - 迁移前自动检测应用是否在后台运行，有则直接提示关闭，避免走到一半失败
            - 迁移失败后回滚更干净，不再留下残留目录导致下次迁移卡死
            - 上次迁移失败残留的目标目录，再次迁移时会明确提示"上次未完成"，一键覆盖重试

            ### 扫描与显示修复
            - 修复应用列表出现大量系统 UWP 运行时组件（WindowsApps 目录下）的问题
            - 修复部分应用图标无法显示的问题（安装路径尾部多余符号导致）
            - 批量迁移时进度事件不再互相覆盖

            ### 恢复操作改进
            - 恢复成功后自动清理目标盘副本，无需手动删除
            - 修复恢复过程中数据迁移回原位置后的残余副本清理问题
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
